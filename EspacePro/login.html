<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion — UpcycleConnect Pro</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,400&family=Nunito+Sans:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="/UpcycleConnect-/EspacePro/assets/css/pro.css"
    />

    <style>
      body {
        min-height: 100vh;
        background: var(--uc-bg);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        width: 100%;
        max-width: 420px;
        background: #fff;
        border: 1px solid var(--uc-bs);
        border-radius: 20px;
        padding: 2.5rem 2rem;
        box-shadow: 0 8px 32px rgba(28, 61, 43, 0.08);
      }
      .login-logo {
        font-family: var(--uc-fd);
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--uc-vf);
      }
      .login-logo em {
        font-style: italic;
        color: var(--uc-vc);
      }
      .btn-login {
        background: var(--uc-vf);
        color: var(--uc-bw);
        border: none;
        border-radius: 12px;
        padding: 0.75rem;
        font-weight: 700;
        transition: background 0.15s;
      }
      .btn-login:hover {
        background: var(--uc-vm);
        color: #fff;
      }
      .btn-login:disabled {
        background: var(--uc-gl);
      }
      .error-msg {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="text-center mb-4">
        <svg width="48" height="48" viewBox="0 0 100 100" fill="none">
          <path
            d="M26 60C20 52 19 40 26 34L34 28"
            stroke="#A8D5A2"
            stroke-width="7"
            stroke-linecap="round"
          />
          <path d="M30 22L36 32L24 35Z" fill="#A8D5A2" />
          <path
            d="M74 60C80 52 81 40 74 34L66 28"
            stroke="#4D9E6A"
            stroke-width="7"
            stroke-linecap="round"
          />
          <path d="M70 22L64 32L76 35Z" fill="#4D9E6A" />
          <path
            d="M38 70C44 78 56 78 62 70L66 62"
            stroke="#C4623A"
            stroke-width="7"
            stroke-linecap="round"
          />
          <path d="M70 68L62 62L68 56Z" fill="#C4623A" />
          <ellipse
            cx="50"
            cy="46"
            rx="9"
            ry="14"
            fill="#2E6B47"
            opacity="0.95"
            transform="rotate(-10 50 46)"
          />
        </svg>
        <div class="login-logo mt-2">Upcycle<em>Connect</em></div>
        <div
          class="text-muted small mt-1"
          style="
            font-family: var(--uc-mono);
            font-size: 0.65rem;
            letter-spacing: 0.1em;
          "
        >
          ESPACE PROFESSIONNEL
        </div>
      </div>

      <div class="alert alert-danger error-msg" id="error-msg" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span id="error-text"></span>
      </div>

      <form id="login-form" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label fw-semibold small"
            >Adresse email</label
          >
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            placeholder="artisan@monentreprise.fr"
            autocomplete="email"
            required
          />
          <div class="invalid-feedback">Adresse email invalide.</div>
        </div>

        <div class="mb-4">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label for="password" class="form-label fw-semibold small mb-0"
              >Mot de passe</label
            >
            <a
              href="/UpcycleConnect-/EspacePro/forgot-password.html"
              class="text-success small"
              >Mot de passe oublié ?</a
            >
          </div>
          <div class="input-group">
            <input
              type="password"
              class="form-control border-end-0"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
              minlength="8"
            />
            <button
              class="btn btn-outline-secondary border-start-0"
              type="button"
              id="toggle-password"
              title="Afficher le mot de passe"
            >
              <i class="bi bi-eye" id="eye-icon"></i>
            </button>
            <div class="invalid-feedback">
              Mot de passe requis (min. 8 caractères).
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-login w-100" id="login-btn">
          <span id="login-label">Se connecter</span>
          <span
            id="login-spinner"
            class="spinner-border spinner-border-sm ms-2"
            role="status"
            style="display: none"
          ></span>
        </button>
      </form>

      <div class="text-center mt-4 text-muted small">
        Pas encore de compte Pro ?
        <a
          href="/UpcycleConnect-/EspacePro/register.html"
          class="text-success fw-semibold"
          >Créer un compte</a
        >
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/UpcycleConnect-/EspacePro/assets/js/core/auth.js"></script>
    <script src="/UpcycleConnect-/EspacePro/assets/js/core/api.js"></script>

    <script>
      (function () {
        if (Auth.isAuthenticated()) {
          const params = new URLSearchParams(window.location.search);
          const returnTo = params.get("returnTo") || "#/dashboard";
          window.location.href = `/UpcycleConnect-/EspacePro/index.html${decodeURIComponent(returnTo)}`;
          return;
        }

        document
          .getElementById("toggle-password")
          .addEventListener("click", function () {
            const input = document.getElementById("password");
            const icon = document.getElementById("eye-icon");
            if (input.type === "password") {
              input.type = "text";
              icon.className = "bi bi-eye-slash";
            } else {
              input.type = "password";
              icon.className = "bi bi-eye";
            }
          });

        function showError(msg) {
          const el = document.getElementById("error-msg");
          document.getElementById("error-text").textContent = msg;
          el.style.display = "";
        }
        function hideError() {
          document.getElementById("error-msg").style.display = "none";
        }
        function setLoading(loading) {
          document.getElementById("login-btn").disabled = loading;
          document.getElementById("login-label").textContent = loading
            ? "Connexion…"
            : "Se connecter";
          document.getElementById("login-spinner").style.display = loading
            ? ""
            : "none";
        }

        document
          .getElementById("login-form")
          .addEventListener("submit", async function (e) {
            e.preventDefault();
            hideError();

            const form = e.target;
            const email = form.email.value.trim();
            const password = form.password.value;

            form.classList.add("was-validated");
            if (!form.checkValidity()) return;

            setLoading(true);

            try {
              const { data, error } = await API.auth.login(email, password);

              if (error) {
                showError(error);
                setLoading(false);
                return;
              }

              if (data.user.role !== "Pro") {
                showError(
                  "Cet accès est réservé aux professionnels et artisans.",
                );
                setLoading(false);
                return;
              }

              Auth.saveSession(data.token, data.user);
              console.log(
                "Token sauvegardé:",
                localStorage.getItem("uc_pro_token"),
              );

              const params = new URLSearchParams(window.location.search);
              const returnTo = params.get("returnTo") || "#/dashboard";
              window.location.href = `/UpcycleConnect-/EspacePro/index.html${decodeURIComponent(returnTo)}`;
            } catch (err) {
              console.error("[Login]", err);
              showError("Erreur inattendue. Réessayez.");
              setLoading(false);
            }
          });
      })();
    </script>
  </body>
</html>
