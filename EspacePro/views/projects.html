<div class="d-flex align-items-start justify-content-between mb-4 flex-wrap gap-2">
  <div>
    <h1 class="mb-1" style="font-size:1.6rem">Mes Projets Upcycling</h1>
    <p class="text-muted mb-0" style="font-size:.8rem">
      Suivi complet · Collecte → Transformation → Vente
    </p>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-sm btn-outline-secondary"
            onclick="ProModules.projects.toggleView()" id="btn-toggle-view">
      <i class="bi bi-grid me-1"></i>Grille
    </button>
    <a href="#/projects/new" class="btn btn-sm fw-bold"
       style="background:var(--uc-vf);color:#fff">
      <i class="bi bi-plus-circle me-1"></i>Nouveau projet
    </a>
  </div>
</div>
<div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
  <div class="d-flex gap-1 flex-wrap" id="status-filters">
    <button class="btn btn-sm proj-filter-btn active" data-filter="all"
            onclick="ProModules.projects.filterByStatus('all',this)">Tous</button>
    <button class="btn btn-sm proj-filter-btn" data-filter="COLLECTE"
            onclick="ProModules.projects.filterByStatus('COLLECTE',this)">
      <span style="color:#1D4ED8">●</span> Collecte
    </button>
    <button class="btn btn-sm proj-filter-btn" data-filter="TRANSFORMATION"
            onclick="ProModules.projects.filterByStatus('TRANSFORMATION',this)">
      <span style="color:#92400E">●</span> Transformation
    </button>
    <button class="btn btn-sm proj-filter-btn" data-filter="VENTE"
            onclick="ProModules.projects.filterByStatus('VENTE',this)">
      <span style="color:var(--uc-vm)">●</span> Vente
    </button>
    <button class="btn btn-sm proj-filter-btn" data-filter="TERMINE"
            onclick="ProModules.projects.filterByStatus('TERMINE',this)">
      <span style="color:var(--uc-gm)">●</span> Terminé
    </button>
  </div>
  <div class="ms-auto">
    <select class="form-select form-select-sm"
            style="width:auto;font-size:.72rem;border-color:var(--uc-bs)"
            onchange="ProModules.projects.setSort(this.value)">
      <option value="recent">Plus récent</option>
      <option value="impact">Impact CO₂</option>
      <option value="progress">Progression</option>
    </select>
  </div>
</div>
<div class="row g-2 mb-4" id="projects-kpis">
  <div class="col-12 text-center py-3">
    <div class="spinner-border spinner-border-sm text-success" role="status"></div>
  </div>
</div>
<div id="projects-container">
  <div class="text-center py-5">
    <div class="spinner-border text-success" role="status"></div>
    <div class="text-muted small mt-2">Chargement des projets…</div>
  </div>
</div>
<div class="d-flex justify-content-center gap-1 mt-4" id="projects-pagination"></div>
<div class="modal fade" id="modal-delete-project" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width:400px">
    <div class="modal-content border-0 rounded-4">
      <div class="modal-body p-4 text-center">
        <div style="font-size:3rem;margin-bottom:.75rem">🗑️</div>
        <h5 style="font-family:var(--uc-fd);color:var(--uc-vf)">Supprimer le projet ?</h5>
        <p class="text-muted small mb-3" id="delete-project-name">–</p>
        <div class="alert alert-warning rounded-3 text-start small mb-3">
          Cette action est irréversible. Toutes les données d'impact seront perdues.
        </div>
        <div class="d-flex gap-2 justify-content-center">
          <button class="btn btn-outline-secondary rounded-3" data-bs-dismiss="modal">Annuler</button>
          <button class="btn btn-danger rounded-3 fw-bold"
                  onclick="ProModules.projects.executeDelete()">
            Supprimer
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
<style>
  .proj-filter-btn {
    font-size:.7rem;font-weight:600;border-radius:20px;padding:.25rem .75rem;
    border:1.5px solid var(--uc-bs);background:#fff;color:var(--uc-gm);transition:all .12s;
  }
  .proj-filter-btn:hover  { border-color:var(--uc-vc);color:var(--uc-vm); }
  .proj-filter-btn.active { background:var(--uc-vf);color:#fff;border-color:var(--uc-vf); }
  .timeline-wrap { display:flex;align-items:center;margin:.75rem 0;position:relative; }
  .tl-step { display:flex;flex-direction:column;align-items:center;flex:1;position:relative; }
  .tl-step:not(:last-child)::after {
    content:'';position:absolute;top:14px;left:50%;width:100%;height:2px;z-index:0;
  }
  .tl-step.done:not(:last-child)::after    { background:var(--uc-vc); }
  .tl-step.current:not(:last-child)::after { background:linear-gradient(90deg,var(--uc-vc),var(--uc-gl)); }
  .tl-step.todo:not(:last-child)::after    { background:var(--uc-gl); }
  .tl-circle {
    width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:.7rem;font-weight:700;z-index:1;position:relative;
  }
  .tl-circle.done    { background:var(--uc-vc);color:#fff; }
  .tl-circle.current { background:var(--uc-vf);color:#fff;box-shadow:0 0 0 3px var(--uc-vl); }
  .tl-circle.todo    { background:#fff;color:var(--uc-gl);border:2px solid var(--uc-gl); }
  .tl-label {
    font-size:.55rem;font-family:var(--uc-mono);color:var(--uc-gm);
    margin-top:.3rem;text-align:center;text-transform:uppercase;letter-spacing:.06em;
  }
  .tl-label.current { color:var(--uc-vf);font-weight:700; }
  .proj-card {
    background:#fff;border:1px solid var(--uc-bs);border-radius:16px;padding:1.25rem;
    transition:box-shadow .15s;margin-bottom:.85rem;
  }
  .proj-card:hover { box-shadow:0 4px 16px rgba(28,61,43,.08); }
  .proj-icon {
    width:44px;height:44px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;
  }
  .proj-progress-bar { height:6px;background:var(--uc-gxl);border-radius:3px;overflow:hidden; }
  .proj-progress-fill {
    height:100%;border-radius:3px;
    background:linear-gradient(90deg,var(--uc-vm),var(--uc-vc));transition:width .5s ease;
  }
  .status-pill {
    font-size:.58rem;font-family:var(--uc-mono);font-weight:700;
    padding:.18rem .55rem;border-radius:12px;text-transform:uppercase;letter-spacing:.07em;
  }
  .sp-collecte { background:#EFF6FF;color:#1D4ED8; }
  .sp-transfo  { background:#FFF7E6;color:#92400E; }
  .sp-vente    { background:var(--uc-vxl);color:var(--uc-vm); }
  .sp-termine  { background:var(--uc-gxl);color:var(--uc-gm); }
  .proj-page-btn {
    width:32px;height:32px;display:flex;align-items:center;justify-content:center;
    border-radius:8px;border:1px solid var(--uc-bs);background:#fff;
    font-size:.78rem;cursor:pointer;transition:all .12s;color:var(--uc-gc);
  }
  .proj-page-btn:hover  { border-color:var(--uc-vc);color:var(--uc-vm); }
  .proj-page-btn.active { background:var(--uc-vf);color:#fff;border-color:var(--uc-vf); }
</style>
