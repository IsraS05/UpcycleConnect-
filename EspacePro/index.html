<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Espace Pro — UpcycleConnect</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,400&family=Nunito+Sans:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="/UpcycleConnect-/EspacePro/assets/css/pro.css"
    />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: none;
      }
    </style>

    <script
      src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"
      defer
    ></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function (OneSignal) {
        await OneSignal.init({
          appId: "TON_APP_ID_ICI",
          notifyButton: { enable: false },
          allowLocalhostAsSecureOrigin: true, 
        });
      });
    </script>
  </head>
  <body>
    <div class="d-flex vh-100 overflow-hidden" id="pro-app">
      <nav class="pro-sidebar d-flex flex-column" id="pro-sidebar">
        <div class="sidebar-logo border-bottom border-sidebar px-3 py-3">
          <div class="d-flex align-items-center gap-2">
            <svg width="32" height="32" viewBox="0 0 100 100" fill="none">
              <path
                d="M26 60C20 52 19 40 26 34L34 28"
                stroke="#A8D5A2"
                stroke-width="7"
                stroke-linecap="round"
              />
              <path d="M30 22L36 32L24 35Z" fill="#A8D5A2" />
              <path
                d="M74 60C80 52 81 40 74 34L66 28"
                stroke="#4D9E6A"
                stroke-width="7"
                stroke-linecap="round"
              />
              <path d="M70 22L64 32L76 35Z" fill="#4D9E6A" />
              <path
                d="M38 70C44 78 56 78 62 70L66 62"
                stroke="#C4623A"
                stroke-width="7"
                stroke-linecap="round"
              />
              <path d="M70 68L62 62L68 56Z" fill="#C4623A" />
              <ellipse
                cx="50"
                cy="46"
                rx="9"
                ry="14"
                fill="#2E6B47"
                opacity="0.95"
                transform="rotate(-10 50 46)"
              />
            </svg>
            <span class="logo-text">Upcycle<em>Connect</em></span>
          </div>
          <span class="pro-role-badge mt-2 d-inline-block"
            >⬡ Espace Pro / Artisan</span
          >
        </div>

        <div
          class="sidebar-profile mx-2 my-2 p-2 rounded-3"
          id="sidebar-profile"
          role="button"
        >
          <div class="d-flex align-items-center gap-2">
            <div class="profile-avatar" id="profile-initials">–</div>
            <div class="flex-grow-1 overflow-hidden">
              <div class="profile-name" id="profile-name">Chargement…</div>
              <div class="profile-plan" id="profile-plan">–</div>
            </div>
            <i class="bi bi-chevron-expand text-sidebar-muted small"></i>
          </div>
        </div>

        <div class="flex-grow-1 overflow-auto py-1">
          <div class="sidebar-section-label px-3 mt-2">Principal</div>

          <a href="#/dashboard" data-route="dashboard" class="sidebar-link">
            <i class="bi bi-grid-1x2"></i>
            <span>Dashboard</span>
          </a>
          <a href="#/map" data-route="map" class="sidebar-link">
            <i class="bi bi-geo-alt"></i>
            <span>Carte & Collecte</span>
            <span
              class="ms-auto badge bg-danger rounded-pill notif-count"
              id="map-badge"
              style="display: none"
            ></span>
          </a>
          <a href="#/projects" data-route="projects" class="sidebar-link">
            <i class="bi bi-activity"></i>
            <span>Mes Projets</span>
          </a>
          <a href="#/scanner" data-route="scanner" class="sidebar-link">
            <i class="bi bi-qr-code-scan"></i>
            <span>Scanner QR</span>
          </a>

          <div class="sidebar-section-label px-3 mt-3">Commerce</div>

          <a href="#/marketplace" data-route="marketplace" class="sidebar-link">
            <i class="bi bi-shop"></i>
            <span>Marketplace</span>
          </a>
          <a href="#/billing" data-route="billing" class="sidebar-link">
            <i class="bi bi-receipt"></i>
            <span>Factures</span>
          </a>
          <a
            href="#/subscription"
            data-route="subscription"
            class="sidebar-link"
          >
            <i class="bi bi-stars"></i>
            <span>Mon Abonnement</span>
          </a>

          <div class="sidebar-section-label px-3 mt-3">Compte</div>

          <a href="#/profile" data-route="profile" class="sidebar-link">
            <i class="bi bi-person-badge"></i>
            <span>Profil Entreprise</span>
          </a>
          <a
            href="#/notifications"
            data-route="notifications"
            class="sidebar-link"
          >
            <i class="bi bi-bell"></i>
            <span>Notifications</span>
            <span
              class="ms-auto badge bg-danger rounded-pill"
              id="notif-badge"
              style="display: none"
            ></span>
          </a>
        </div>

        <div class="sidebar-footer border-top border-sidebar px-3 py-2">
          <div class="d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-2">
              <span class="session-dot"></span>
              <span
                class="text-sidebar-muted"
                style="font-size: 0.65rem; font-family: var(--uc-mono)"
                >Session active</span
              >
            </div>
            <button
              class="btn btn-link btn-sm p-0 text-sidebar-muted"
              onclick="Auth.logout()"
              title="Déconnexion"
            >
              <i class="bi bi-box-arrow-right"></i>
            </button>
          </div>
        </div>
      </nav>

      <div class="flex-grow-1 d-flex flex-column overflow-hidden">
        <header
          class="pro-topbar border-bottom d-flex align-items-center gap-3 px-4"
        >
          <button
            class="btn btn-sm btn-outline-secondary d-md-none"
            id="sidebar-toggle"
          >
            <i class="bi bi-list"></i>
          </button>

          <div class="pro-search flex-grow-1" style="max-width: 420px">
            <div class="input-group input-group-sm">
              <span class="input-group-text bg-light border-end-0">
                <i class="bi bi-search text-muted"></i>
              </span>
              <input
                type="text"
                class="form-control border-start-0 bg-light"
                placeholder="Rechercher un objet, conteneur, projet…"
                id="global-search"
              />
            </div>
          </div>

          <div class="ms-auto d-flex align-items-center gap-2">
            <span class="badge premium-badge d-none" id="premium-badge">
              <i class="bi bi-star-fill me-1"></i>Premium
            </span>

            <div class="dropdown">
              <button
                class="btn btn-sm btn-outline-light border position-relative"
                id="notif-btn"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <i class="bi bi-bell" style="color: var(--uc-gc)"></i>
                <span
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                  id="topbar-notif-count"
                  style="display: none; font-size: 0.55rem"
                ></span>
              </button>
              <div
                class="dropdown-menu dropdown-menu-end shadow-sm"
                style="width: 320px; max-height: 420px; overflow-y: auto"
              >
                <div class="dropdown-header d-flex justify-content-between">
                  <strong>Notifications</strong>
                  <a href="#/notifications" class="small text-success"
                    >Tout voir</a
                  >
                </div>
                <div id="notif-dropdown-list">
                  <div class="text-center text-muted py-3 small">
                    Chargement…
                  </div>
                </div>
              </div>
            </div>

            <span
              class="text-muted small d-none d-md-inline"
              id="pro-breadcrumb"
            ></span>
          </div>
        </header>

        <main class="flex-grow-1 overflow-auto p-4" id="pro-view">
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/UpcycleConnect-/EspacePro/assets/js/core/auth.js"></script>
    <script src="/UpcycleConnect-/EspacePro/assets/js/core/store.js"></script>
    <script src="/UpcycleConnect-/EspacePro/assets/js/core/api.js"></script>
    <script src="/UpcycleConnect-/EspacePro/assets/js/core/router.js"></script>

    <script src="/UpcycleConnect-/EspacePro/assets/js/components/sidebar.js"></script>
    <script src="/UpcycleConnect-/EspacePro/assets/js/components/topbar.js"></script>

    <script>
      window.ProModules = {};
    </script>

    <script>
      (async function initProApp() {
        const session = Auth.guard();
        console.log("session:", session);
        console.log("token:", Auth.getToken());
        if (!session) return; 

        Store.actions.initSession();

        try {
          await Auth.tryRefreshToken();
        } catch (e) {
          console.warn("[App] Refresh token échoué:", e);
        }

        document.body.style.display = "block";
        document.body.style.height = "100%";
        document.documentElement.style.height = "100%";

        const user = Store.get("user");
        if (user) {
          const initials =
            `${user.prenom?.[0] || ""}${user.nom?.[0] || ""}`.toUpperCase();
          document.getElementById("profile-initials").textContent =
            initials || "?";
          document.getElementById("profile-name").textContent =
            `${user.prenom} ${user.nom}`;
          document.getElementById("profile-plan").textContent =
            user.subscription === "PREMIUM"
              ? "Pro Premium · SIRET ✓"
              : "Pro Standard";

          if (Auth.isPremium()) {
            document
              .getElementById("premium-badge")
              ?.classList.remove("d-none");
          }
        }

        try {
          const { data } = await API.notifications.getAll();
          if (data) {
            const unread = data.filter((n) => !n.read).length;
            Store.actions.setUnreadCount(unread);
          }
        } catch (e) {
        }

        Store.subscribe("notifications", ({ unreadCount }) => {
          const badge = document.getElementById("topbar-notif-count");
          const sidebarBadge = document.getElementById("notif-badge");
          if (badge) {
            badge.textContent = unreadCount > 9 ? "9+" : unreadCount;
            badge.style.display = unreadCount > 0 ? "" : "none";
          }
          if (sidebarBadge) {
            sidebarBadge.textContent = unreadCount > 9 ? "9+" : unreadCount;
            sidebarBadge.style.display = unreadCount > 0 ? "" : "none";
          }
        });

        document
          .getElementById("sidebar-toggle")
          ?.addEventListener("click", () => {
            document.getElementById("pro-sidebar").classList.toggle("show");
          });

        Router.init();
      })();
    </script>
  </body>
</html>
